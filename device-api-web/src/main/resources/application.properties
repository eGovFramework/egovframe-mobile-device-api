Globals.dangerousFileExtensions=.exe,.bat,.cmd,.com,.pif,.scr,.vbs,.js,.jsp,.jspx,.php,.php3,.php4,.php5,.phtml,.asp,.aspx,.ashx,.asmx,.sh,.bash,.csh,.ksh,.pl,.py,.rb,.jar,.war,.ear,.dll,.so,.dylib,.class,.action,.do,.htaccess,.htpasswd

